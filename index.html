<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agrinho 2026 - Abelhas</title>

<style>

/* ================= LOGIN ================= */
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #f4c430, #000);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* GLASS LOGIN */
.login {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    color: white;
    width: 300px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #f4c430;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: black;
    color: white;
}

/* ================= APP ================= */
#app {
    display: none;
    width: 100%;
    height: 100vh;
    background: #fff8dc;
    flex-direction: column;
}

/* HEADER */
header {
    background: #000;
    color: white;
    text-align: center;
    padding: 10px;
}

/* CONTEÚDO */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    flex: 1;
}

/* RODA */
.roda {
    width: 250px;
    height: 250px;
    border-radius: 50%;
    background: conic-gradient(
        #f4c430 0deg 90deg,
        #222 90deg 180deg,
        #f4c430 180deg 270deg,
        #222 270deg 360deg
    );
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* BOTÕES DA RODA */
.part {
    position: absolute;
    width: 120px;
    height: 120px;
    cursor: pointer;
}

/* INFO */
.info {
    margin-top: 20px;
    width: 80%;
    background: white;
    padding: 15px;
    border-radius: 10px;
    display: none;
}

/* QUIZ */
#quiz {
    display: none;
    padding: 20px;
}

</style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div class="login" id="login">
    <h2>🐝 Agrinho 2026</h2>

    <input id="user" placeholder="Nome do concurso">
    <input id="pass" placeholder="Ano">

    <button onclick="entrar()">Entrar</button>
</div>

<!-- ================= APP ================= -->
<div id="app">

<header>
<h2>🐝 Painel das Abelhas</h2>
</header>

<div class="container">

<!-- RODA -->
<div class="roda">

    <div class="part" onclick="mostrar(0)"></div>
    <div class="part" onclick="mostrar(1)"></div>
    <div class="part" onclick="mostrar(2)"></div>
    <div class="part" onclick="mostrar(3)"></div>

</div>

<!-- INFO -->
<div class="info" id="info"></div>

<button onclick="irQuiz()">Ir para o Quiz 🧠</button>

</div>

<!-- QUIZ -->
<div id="quiz">
<h2>🧠 Quiz</h2>

<p id="q">O que acontece sem abelhas?</p>

<button onclick="res(true)">Colapso agrícola</button>
<button onclick="res(false)">Nada muda</button>

<p id="r"></p>

</div>

</div>

<script>

/* LOGIN */
function entrar() {
    let u = document.getElementById("user").value.toLowerCase();
    let p = document.getElementById("pass").value;

    if (u === "agrinho" && p === "2026") {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "flex";
    } else {
        alert("Senha ou usuário incorretos!");
    }
}

/* CONTEÚDOS DA RODA */
let textos = [
    "🐝 As abelhas são responsáveis pela polinização de mais de 70% dos alimentos.",
    "🌱 Sem abelhas, a biodiversidade entra em colapso.",
    "⚠️ Agrotóxicos são uma das maiores ameaças às colônias.",
    "💧 A agricultura sustentável depende do equilíbrio ambiental."
];

/* MOSTRAR INFO */
function mostrar(i) {
    let box = document.getElementById("info");
    box.style.display = "block";
    box.innerText = textos[i];
}

/* IR PARA QUIZ */
function irQuiz() {
    document.querySelector(".container").style.display = "none";
    document.getElementById("quiz").style.display = "block";
}

/* QUIZ */
function res(c) {
    let r = document.getElementById("r");

    if (c) {
        r.innerText = "✔ Correto!";
        r.style.color = "green";
    } else {
        r.innerText = "❌ Tente novamente";
        r.style.color = "red";
    }
}

</script>

</body>
</html>
