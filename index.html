<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agrinho 2026 - Abelhas</title>

<style>

/* ================= FUNDO ================= */
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    height: 100vh;
}

/* GRADIENTE FUNDO */
.background {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #f4c430, #000);
    z-index: -3;
}

/* ================= ABELHAS VOANDO ================= */
.bee {
    position: absolute;
    width: 40px;
    animation: fly linear infinite;
    z-index: -1;
}

@keyframes fly {
    0% { transform: translate(-10vw, 10vh); }
    100% { transform: translate(110vw, 80vh); }
}

/* ================= ESTRELAS ================= */
.star {
    position: absolute;
    width: 10px;
    height: 10px;
    background: white;
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    opacity: 0.6;
    animation: twinkle 3s infinite;
}

@keyframes twinkle {
    0%,100% { opacity: 0.2; }
    50% { opacity: 1; }
}

/* ================= LOGIN ================= */
.login {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    color: white;
    width: 300px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #f4c430;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: black;
    color: white;
}

/* ================= APP ================= */
#app {
    display: none;
    height: 100vh;
    flex-direction: column;
}

header {
    background: rgba(0,0,0,0.8);
    color: white;
    text-align: center;
    padding: 10px;
}

/* CONTAINER */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

/* ROLETA */
.roleta {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: conic-gradient(#f4c430 0deg 90deg,#222 90deg 180deg,#f4c430 180deg 270deg,#222 270deg 360deg);
    transition: transform 2s ease-out;
}

/* TEXTO */
.box {
    margin-top: 15px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    width: 90%;
    display: none;
}

/* QUIZ */
#quiz {
    display: none;
    padding: 20px;
    text-align: center;
    color: white;
}

.option {
    display: block;
    margin: 10px auto;
    width: 90%;
}

</style>
</head>

<body>

<div class="background"></div>

<!-- ABELHAS DECORATIVAS -->
<img class="bee" src="https://upload.wikimedia.org/wikipedia/commons/4/4c/Apis_mellifera_flying.jpg" style="top:10%; animation-duration:12s;">
<img class="bee" src="https://upload.wikimedia.org/wikipedia/commons/4/4c/Apis_mellifera_flying.jpg" style="top:40%; animation-duration:18s;">
<img class="bee" src="https://upload.wikimedia.org/wikipedia/commons/4/4c/Apis_mellifera_flying.jpg" style="top:70%; animation-duration:14s;">
<!-- ESTRELAS -->
<script>
for(let i=0;i<25;i++){
    let s = document.createElement("div");
    s.className = "star";
    s.style.top = Math.random()*100 + "vh";
    s.style.left = Math.random()*100 + "vw";
    document.body.appendChild(s);
}
</script>

<!-- ================= LOGIN ================= -->
<div class="login" id="login">
    <h2>🐝 Agrinho 2026</h2>

    <input id="user" placeholder="Nome do concurso">
    <input id="pass" placeholder="Ano">

    <button onclick="entrar()">Entrar</button>
</div>

<!-- ================= APP ================= -->
<div id="app">

<header>
<h3>🐝 Painel das Abelhas</h3>
</header>

<div class="container">

<div class="roleta" id="roleta"></div>

<button onclick="girar()">🎡 Girar roleta</button>

<div class="box" id="box"></div>

<button onclick="irQuiz()">Ir para Quiz 🧠</button>

</div>

<div id="quiz">

<h2>🧠 Quiz Final</h2>

<p id="q"></p>

<button class="option" onclick="res(1)">Agricultura sustentável</button>
<button class="option" onclick="res(0)">Ignorar abelhas</button>
<button class="option" onclick="res(0)">Aumentar agrotóxicos</button>

<p id="r"></p>

</div>

</div>

<script>

/* LOGIN */
function entrar(){
    let u = document.getElementById("user").value.toLowerCase();
    let p = document.getElementById("pass").value;

    if(u==="agrinho" && p==="2026"){
        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="flex";
    } else {
        alert("Erro no login!");
    }
}

/* TEXTO */
let textos = [
"A polinização permite a reprodução das plantas e mantém a biodiversidade.",
"As abelhas são essenciais para frutas, verduras e sementes.",
"Agrotóxicos prejudicam a orientação e sobrevivência das abelhas.",
"A solução é agricultura sustentável e redução de químicos."
];

let graus = 0;

/* ROLETA */
function girar(){
    let i = Math.floor(Math.random()*4);
    graus += 1080 + i*90;

    document.getElementById("roleta").style.transform = `rotate(${graus}deg)`;

    setTimeout(()=>{
        let box = document.getElementById("box");
        box.style.display="block";
        box.innerText = textos[i];
    },2000);
}

/* QUIZ */
function irQuiz(){
    document.querySelector(".container").style.display="none";
    document.getElementById("quiz").style.display="block";
    document.getElementById("q").innerText="O que acontece sem abelhas?";
}

function res(v){
    let r=document.getElementById("r");

    if(v){
        r.innerText="✔ Excelente! Você entendeu sustentabilidade.";
        r.style.color="lightgreen";
    } else {
        r.innerText="❌ Reflita sobre a importância das abelhas.";
        r.style.color="red";
    }
}

</script>

</body>
</html>
