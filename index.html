<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agrinho 2026 - Abelhas</title>

<style>

/* ================= LOGIN ================= */
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #f4c430, #000);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* LOGIN GLASS */
.login {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 15px;
    color: white;
    text-align: center;
    width: 300px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #f4c430;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: black;
    color: white;
}

/* ================= APP ================= */
#app {
    display: none;
    width: 100%;
    height: 100vh;
    background: #fff8dc;
    flex-direction: column;
}

/* HEADER */
header {
    background: #000;
    color: white;
    text-align: center;
    padding: 10px;
}

/* CONTAINER */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

/* ROLETAAAAA */
.roleta {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: conic-gradient(
        #f4c430 0deg 90deg,
        #222 90deg 180deg,
        #f4c430 180deg 270deg,
        #222 270deg 360deg
    );
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    transition: transform 2s ease-out;
}

/* BOTÃO */
.spin {
    margin-top: 15px;
}

/* TEXTO */
.box {
    margin-top: 20px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    width: 90%;
    display: none;
}

/* QUIZ */
#quiz {
    display: none;
    padding: 20px;
    text-align: center;
}

.option {
    display: block;
    margin: 10px auto;
    width: 90%;
}

</style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div class="login" id="login">
    <h2>🐝 Agrinho 2026</h2>

    <input id="user" placeholder="Nome do concurso">
    <input id="pass" placeholder="Ano">

    <button onclick="entrar()">Entrar</button>
</div>

<!-- ================= APP ================= -->
<div id="app">

<header>
<h3>🐝 Painel das Abelhas</h3>
</header>

<div class="container">

<!-- ROLETAAAA -->
<div class="roleta" id="roleta"></div>

<button class="spin" onclick="girar()">🎡 Girar roleta</button>

<div class="box" id="box"></div>

<button onclick="irQuiz()">Ir para o Quiz 🧠</button>

</div>

<!-- QUIZ -->
<div id="quiz">

<h2>🧠 Quiz Final</h2>

<p id="q"></p>

<button class="option" onclick="res(1)">Começar agricultura sustentável</button>
<button class="option" onclick="res(0)">Ignorar abelhas</button>
<button class="option" onclick="res(0)">Usar mais agrotóxicos</button>

<p id="r"></p>

</div>

</div>

<script>

/* ================= LOGIN ================= */
function entrar() {
    let u = document.getElementById("user").value.toLowerCase();
    let p = document.getElementById("pass").value;

    if (u === "agrinho" && p === "2026") {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "flex";
    } else {
        alert("Erro no login!");
    }
}

/* ================= TEXTO (SEU CONTEÚDO) ================= */
let textos = [
`A polinização é um processo essencial para a reprodução de muitas plantas, permitindo a formação de frutos e sementes e mantendo a biodiversidade.`,

`As abelhas são os principais polinizadores. Elas garantem alimentos como frutas, verduras e sementes, sendo essenciais para a agricultura.`,

`O uso excessivo de agrotóxicos prejudica as abelhas, causando intoxicação, desorientação e redução das populações no mundo.`,

`A solução envolve agricultura sustentável, controle biológico e redução de agrotóxicos para proteger as abelhas e o equilíbrio ambiental.`
];

let graus = 0;

/* ================= ROLETAAAA ================= */
function girar() {
    let roleta = document.getElementById("roleta");

    let index = Math.floor(Math.random() * 4);

    graus += 360 * 3 + (index * 90);

    roleta.style.transform = `rotate(${graus}deg)`;

    setTimeout(() => {
        let box = document.getElementById("box");
        box.style.display = "block";
        box.innerText = textos[index];
    }, 2000);
}

/* ================= QUIZ ================= */
function irQuiz() {
    document.querySelector(".container").style.display = "none";
    document.getElementById("quiz").style.display = "block";

    document.getElementById("q").innerText =
        "O que acontece se não protegermos as abelhas?";
}

function res(v) {
    let r = document.getElementById("r");

    if (v === 1) {
        r.innerText = "✔ Excelente! Você entendeu a importância da sustentabilidade.";
        r.style.color = "green";
    } else {
        r.innerText = "❌ Pense na importância das abelhas!";
        r.style.color = "red";
    }
}

</script>

</body>
</html>
